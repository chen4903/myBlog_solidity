pan><br><span class="line">57</span><br><span class="line">58</span><br><span class="line">59</span><br><span class="line">60</span><br><span class="line">61</span><br><span class="line">62</span><br><span class="line">63</span><br><span class="line">64</span><br><span class="line">65</span><br><span class="line">66</span><br><span class="line">67</span><br><span class="line">68</span><br><span class="line">69</span><br><span class="line">70</span><br><span class="line">71</span><br><span class="line">72</span><br><span class="line">73</span><br><span class="line">74</span><br><span class="line">75</span><br><span class="line">76</span><br><span class="line">77</span><br><span class="line">78</span><br><span class="line">79</span><br><span class="line">80</span><br><span class="line">81</span><br><span class="line">82</span><br></pre></td><td class="code"><pre><span class="line">pragma solidity ^0.6.12;</span><br><span class="line"></span><br><span class="line">contract Existing&#123;</span><br><span class="line"></span><br><span class="line">    string public name = &quot;Existing&quot;;</span><br><span class="line">    string public symbol = &quot;EG&quot;;</span><br><span class="line">    uint256 public decimals = 18;</span><br><span class="line">    uint256 public totalSupply = 10000000;</span><br><span class="line">    bool public flag = false;</span><br><span class="line"></span><br><span class="line">    mapping(address=&gt;bool)public status;</span><br><span class="line"></span><br><span class="line">    event SendFlag(address addr);</span><br><span class="line"></span><br><span class="line">    mapping(address =&gt; uint) public balanceOf;</span><br><span class="line"></span><br><span class="line">    bytes20 internal appearance = bytes20(bytes32(&quot;ZT&quot;))&gt;&gt;144;</span><br><span class="line">    bytes20 internal maskcode = bytes20(uint160(0xffff));</span><br><span class="line"></span><br><span class="line">    constructor()public&#123;</span><br  code = maskcode;</span><br><span class="line">        bytes20 feature = appearance;</span><br><span class="line"></span><br><span class="line">        for (uint256 i = 0; i &lt; 34; i++) &#123;</span><br><span class="line">            if (you &amp; code == feature) &#123;</span><br><span class="line">                return true;</span><br><span class="line">            &#125;</span><br><span class="line"></span><br><span class="line">            code &lt;&lt;= 4;</span><br><span class="line">            feature &lt;&lt;= 4;</span><br><span class="line">        &#125;</span><br><span class="line">        return false;</span><br><span class="line">    &#125;</span><br><span class="line"></span><br><span class="line">    function share_my_vault() external only_EOA(msg.sender) only_family &#123;</span><br><span class="line">        uint256 add = balanceOf[address(this)];</span><br><span class="line">        _transfer(address(this),msg.sender,add);</span><br><span class="line">    &#125;</span><br><span class="line"></span><br><span class="line">    function setflag() external&#123;</span><br><span class="line">        if(balanceOf[msg.sender] &gt;= totalSupply) &#123;</span><br><span class="line">            flag = true;</span><br><span class="line">        &#125;</span><br><span class="line">    &#125;</span><br><span class="line">    function isSolved() external view returns(bool) &#123;</span><br><span class="line"></span><br><span class="line">        return flag;</span><br><span class="line">    &#125;</span><br><span class="line">&#125;</span><br></pre></td></tr></table></figure>
